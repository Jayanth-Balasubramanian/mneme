name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Repository policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Run app-specific security checks
        run: |
          bun install --frozen-lockfile
          bun run security:check

  project:
    name: Project checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Run Bun project checks when scaffold exists
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json yet; skipping app checks during planning bootstrap."
            exit 0
          fi

          bun install --frozen-lockfile
          bun run lint
          bun run typecheck
          bun test
          MNEME_DB_PATH=/tmp/mneme-ci.sqlite bun run db:migrate
          bun run build

  deployment-placeholder:
    name: Deployment placeholder
    runs-on: ubuntu-latest
    needs: [policy, project]
    steps:
      - name: Deployment deferred
        run: |
          echo "Continuous deployment will be added after the Cloudflare Workers target is implemented."
